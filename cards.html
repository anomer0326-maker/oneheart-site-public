<style>
  :root{--ink:#3a4744;--body:#46514c;--soft:#5b645d;--sage:#97b3ae;--gold:#4a6a62;--gold2:#45645d;--deep:#46584f;--pink:#f2c3b9;--line:#e3ddd3;--cream:#f4f2ed;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard",sans-serif;background:#e7e4dd;color:var(--ink);word-break:keep-all;-webkit-font-smoothing:antialiased;}
  .bar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .bar h1{font-family:"Gowun Batang",serif;font-size:1.1rem;font-weight:700;color:var(--ink);margin-right:8px;}
  .bar label{font-size:.85rem;color:var(--soft);font-weight:700;margin-right:4px;}
  .bar select,.bar button{font-family:inherit;font-size:.85rem;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:18px;padding:7px 14px;cursor:pointer;}
  .bar .home{font-family:inherit;font-size:.85rem;font-weight:700;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:18px;padding:7px 14px;white-space:nowrap;}
  .bar .home:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
  .bar .seg button.on{background:var(--gold);color:#fff;border-color:var(--gold);}
  .bar .save-all{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700;}
  .hint{padding:12px 20px;font-size:.85rem;color:var(--soft);background:#f6f5f1;border-bottom:1px solid var(--line);}
  .cards{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;padding:28px 16px 80px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .item .dl{font-family:inherit;font-size:.82rem;font-weight:700;border:none;background:var(--gold);color:#fff;border-radius:18px;padding:8px 18px;cursor:pointer;}
  .item .dl:hover{background:var(--gold2);}

  /* ---- 카드 (미리보기 540px, 저장 시 2배 → 1080) ---- */
  .card{width:540px;height:540px;background:var(--cream);
        display:flex;flex-direction:column;position:relative;overflow:hidden;border:1px solid var(--line);}
  .card.por{height:675px;}
  .card .pad{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:52px 50px;}
  .card .top{position:absolute;top:30px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;}
  .card .top img{height:26px;width:auto;opacity:.92;}
  .card .top span{font-family:"Gowun Batang",serif;font-weight:700;font-size:14px;color:var(--ink);letter-spacing:0;}
  .card .foot{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.1em;color:var(--soft);text-transform:uppercase;}
  .card .foot .b{color:var(--gold);font-weight:700;}

  .fit{width:100%;transform-origin:center center;}
  .ko{font-family:"Gowun Batang",serif;line-height:1.5;color:var(--ink);}
  .en{font-family:"Pretendard",sans-serif;color:var(--soft);line-height:1.55;}
  .label{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:20px;}
  .pgind{margin-top:20px;font-size:11px;letter-spacing:.2em;color:var(--soft);font-weight:700;}
  .c-section .pgind,.c-bless .pgind{color:rgba(255,255,255,.6);}

  /* 딥세이지 카드 (대지·축복) — 섹션 리듬 */
  .card.c-section, .card.c-bless{background:var(--deep);border-color:var(--deep);}
  .card.c-section .top span, .card.c-bless .top span{color:rgba(255,255,255,.92);}
  .card.c-section .top img, .card.c-bless .top img{opacity:.78;}
  .card.c-section .label, .card.c-bless .label{color:var(--pink);}
  .card.c-section .foot, .card.c-bless .foot{color:rgba(255,255,255,.5);}
  .card.c-section .foot .b, .card.c-bless .foot .b{color:rgba(255,255,255,.82);}

  /* type styles */
  .c-title .cross{height:60px;margin-bottom:22px;}
  .c-title .t-ko{font-family:"Gowun Batang",serif;font-weight:700;font-size:33px;color:var(--ink);line-height:1.34;}
  .c-title .t-en{font-size:15px;color:var(--gold);margin-top:14px;line-height:1.4;}
  .c-title .ref{margin-top:22px;font-size:13px;color:var(--soft);}
  .c-title .by{margin-top:6px;font-size:13px;color:var(--gold);font-weight:700;}

  .c-section .num{font-family:"Gowun Batang",serif;font-weight:700;font-size:16px;letter-spacing:.04em;color:var(--pink);line-height:1.3;margin-bottom:18px;}
  .c-section .num small{display:block;font-family:"Pretendard",sans-serif;font-weight:700;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:7px;}
  .c-section .s-ko{font-family:"Gowun Batang",serif;font-weight:700;font-size:33px;color:#fff;line-height:1.36;}
  .c-section .s-en{font-size:14px;color:rgba(255,255,255,.72);margin-top:14px;line-height:1.45;}

  .c-scr .qmark{font-family:"Gowun Batang",serif;font-size:54px;color:var(--pink);line-height:.4;height:26px;}
  .c-scr .v-ko{font-family:"Gowun Batang",serif;font-weight:700;font-size:25px;color:var(--ink);line-height:1.55;margin-top:10px;}
  .c-scr .v-en{font-size:14px;color:var(--soft);font-style:italic;line-height:1.5;margin-top:12px;}
  .c-scr .ref{margin-top:20px;font-size:13px;font-weight:700;color:var(--gold2);}

  .c-point .p-ko{font-family:"Gowun Batang",serif;font-weight:700;font-size:25px;color:var(--ink);line-height:1.5;}
  .c-point .p-en{font-size:14px;color:var(--soft);line-height:1.55;margin-top:12px;}
  .c-point .sub{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);font-size:15px;color:var(--gold);line-height:1.55;}
  .c-point .sub .se{display:block;font-size:13px;color:var(--soft);margin-top:6px;}

  .c-bless .b-ko{font-family:"Gowun Batang",serif;font-weight:700;font-size:27px;color:#fff;line-height:1.5;}
  .c-bless .b-en{font-size:14px;color:rgba(255,255,255,.74);line-height:1.5;margin-top:14px;}
  .c-bless .amen{font-family:"Gowun Batang",serif;font-weight:700;font-size:23px;color:var(--pink);letter-spacing:.12em;margin-top:20px;}

  @media(max-width:600px){ .card{transform:scale(.66);transform-origin:top center;margin-bottom:-185px;} .card.por{margin-bottom:-235px;} }
</style>

  let SERMONS=[], cur=null, fmt='sq', lang='both';
  const sel=document.getElementById('sel'), cardsEl=document.getElementById('cards');
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function dt(d){return new Date(d+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});}

  function brkScore(w){
    if(/[—–―ー]$/.test(w)) return 6;
    if(/[,，][”"’')\]]?$/.test(w)) return 5;
    if(/[.!?…][”"’')\]]?$/.test(w)) return 4;
    if(/(으나|지만|면서|는데|은데|아서|어서|여서|도록|거나|니까|므로|지마는|건만|든지)[”"’')\]]?$/.test(w)) return 4;
    if(/^(이|그|저|새|헌|옛|한|두|세|네|모든|온갖|어떤|무슨|웬|온|각|매|첫|다른|딴|별|그런|이런|저런|아무|여러|몇|단|전)$/.test(w)) return -5;
    if(/(던)$/.test(w)) return -3;
    if(/^.[은는을]$/.test(w)) return -2;
    if(/(하고|하며|하면|이며|이고|되고|되며|라며|라고|보다)$/.test(w)) return 3;
    if(/(고|며|면|나)$/.test(w)) return 2;
    if(/(은|는|이|가|을|를|에|에서|에게|으로|로|와|과|도|만|까지|부터|의|께서)$/.test(w)) return 1;
    return 0;
  }
  function koBreath(t, ideal, hard){
    t=(t||'').trim();
    if(!t || !/[가-힣]/.test(t)) return t;
    var words=t.split(/\s+/), n=words.length;
    if(n<2) return t;
    function cl(w){return [...w].length;}
    var pre=[0]; for(var i=0;i<n;i++) pre.push(pre[i]+cl(words[i])+1);
    function lineLen(a,b){return pre[b+1]-pre[a]-1;}
    if(lineLen(0,n-1)<=ideal+4) return t;
    var BASE=8, BREAKW=14, MINLINE=6, LW=0.3;
    var cost=new Array(n+1).fill(Infinity), prev=new Array(n+1).fill(-1); cost[0]=0;
    for(var b=0;b<n;b++){
      for(var a=0;a<=b;a++){
        if(cost[a]===Infinity) continue;
        var len=lineLen(a,b), c=cost[a], dev=len-ideal;
        c+=dev*dev*LW;
        if(len>hard) c+=(len-hard)*40;
        if(b!==n-1){ if(len<MINLINE) c+=60; c+=BASE+(5-brkScore(words[b]))*BREAKW; }
        if(c<cost[b+1]){cost[b+1]=c;prev[b+1]=a;}
      }
    }
    var cuts={}, k=n; while(prev[k]>0){ cuts[prev[k]-1]=1; k=prev[k]; }
    var out=''; for(var j=0;j<n;j++){ out+=words[j]; if(j<n-1) out+= cuts[j]?'\n':' '; }
    return out;
  }
  function koB(t,ideal,hard){ return esc(koBreath(t,ideal,hard)).replace(/\n/g,'<br>'); }
  function pg(sl){ return (sl._pn>1)?`<div class="pgind">${sl._p} / ${sl._pn}</div>`:''; }
  function sentsOf(t){ return (t||'').trim().split(/(?<=[.!?…])\s+/).filter(function(x){return x;}); }
  function partN(lens,P){
    var m=lens.length, pre=[0], i; for(i=0;i<m;i++) pre.push(pre[i]+lens[i]);
    var total=pre[m], target=total/P, INF=1e18, dp=[], from=[];
    for(i=0;i<=m;i++){ dp.push(new Array(P+1).fill(INF)); from.push(new Array(P+1).fill(-1)); }
    dp[0][0]=0;
    for(var p=1;p<=P;p++) for(i=1;i<=m;i++) for(var j=p-1;j<i;j++){
      if(dp[j][p-1]>=INF) continue;
      var seg=pre[i]-pre[j], d=seg-target, c=dp[j][p-1]+d*d;
      if(c<dp[i][p]){ dp[i][p]=c; from[i][p]=j; }
    }
    var cuts=[], ii=m, pp=P; while(pp>0){ var jj=from[ii][pp]; cuts.unshift([jj,ii]); ii=jj; pp--; }
    return cuts;
  }
  function splitN(text,P){
    var s=sentsOf(text); if(s.length<=1) return [text||''];
    P=Math.min(P,s.length); if(P<2) return [text];
    return partN(s.map(function(x){return [...x].length;}),P).map(function(c){return s.slice(c[0],c[1]).join(' ');});
  }
  function paginate(arr){
    var ST={question:1,point:1,conclusion:1,bigidea:1,scripture:1,blessing:1}, MAXC=100, TRIG=130, res=[];
    arr.forEach(function(sl){
      var koc=sl.ko?[...sl.ko].length:0;
      if(!ST[sl.type] || koc<=TRIG){ res.push(sl); return; }
      var P=Math.ceil(koc/MAXC), es=sentsOf(sl.en).length; if(es>=2) P=Math.min(P,es);
      var kp=splitN(sl.ko,P); if(kp.length<2){ res.push(sl); return; }
      var ep=splitN(sl.en||'',kp.length), n=kp.length;
      for(var i=0;i<n;i++){
        var c=Object.assign({},sl);
        c.ko=kp[i]; c.en=(ep[i]!==undefined?ep[i]:'');
        if(i<n-1){ delete c.sub_ko; delete c.sub_en; delete c.ref; delete c.ref_ko; delete c.ref_en; }
        c._p=i+1; c._pn=n; res.push(c);
      }
    });
    return res;
  }


  function init(data){
    SERMONS=(data.sermons||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
    SERMONS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=dt(s.date)+' · '+s.title_ko;sel.appendChild(o);});
    sel.onchange=()=>{cur=SERMONS[sel.value];render();};
    var pid=new URLSearchParams(location.search).get('id');
    var idx=0; if(pid){var j=SERMONS.findIndex(x=>x.id===pid); if(j>=0) idx=j;}
    sel.value=idx; cur=SERMONS[idx]; render();
  }
  if(window.SERMONS_DATA) init(window.SERMONS_DATA);
  else fetch('sermons.json').then(r=>r.json()).then(init).catch(()=>{cardsEl.innerHTML='<p style="padding:30px">sermons-data.js 를 찾을 수 없습니다.</p>';});
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>fitCards());
  window.addEventListener('resize',()=>{clearTimeout(window._ft);window._ft=setTimeout(fitCards,150);});

  function setFmt(f){fmt=f;document.getElementById('sq').className=f==='sq'?'on':'';document.getElementById('por').className=f==='por'?'on':'';render();}
  function setLang(l){lang=l;['both','ko','en'].forEach(x=>document.getElementById(x).className=x===l?'on':'');render();}
  function K(){return lang!=='en';} function E(){return lang!=='ko';}

  function foot(){return `<div class="foot"><span class="b">한마음침례교회</span> · ONE HEART BAPTIST CHURCH · oneheartchurchcolumbus.org</div>`;}
  function topbar(){return `<div class="top"><img src="${CROSS}" alt=""><span>한마음침례교회</span></div>`;}

  function cardHTML(inner,cls){return `<div class="card ${fmt==='por'?'por':''} ${cls}">${topbar()}<div class="pad"><div class="fit">${inner}</div></div>${foot()}</div>`;}

  function buildCards(s){
    const out=[];
    paginate(s.slides||[]).forEach(sl=>{
      if(sl.type==='title'){
        out.push(cardHTML(
          `<img class="cross" src="${CROSS}" alt="">
           <div class="label">주일예배 설교 · SUNDAY SERMON</div>
           ${K()?`<div class="t-ko">${koB(sl.title_ko,12,18)}</div>`:''}
           ${E()&&sl.title_en?`<div class="t-en">${esc(sl.title_en)}</div>`:''}
           <div class="ref">${esc(sl.ref_ko||'')}${sl.ref_en?' · '+esc(sl.ref_en):''}</div>
           <div class="by">${esc(sl.preacher_ko||'')}</div>`,'c-title'));
      } else if(sl.type==='section'){
        out.push(cardHTML(
          `<div class="num">${esc(sl.num_ko||'')}<small>${esc(sl.num_en||'')}</small></div>
           ${K()?`<div class="s-ko">${koB(sl.ko||'',12,18)}</div>`:''}
           ${E()&&sl.en?`<div class="s-en">${esc(sl.en)}</div>`:''}`,'c-section'));
      } else if(sl.type==='scripture'){
        out.push(cardHTML(
          `<div class="label">말씀 · ${esc(sl.ref_en||'KEY VERSE')}</div>
           <div class="qmark">&ldquo;</div>
           ${K()&&sl.ko?`<div class="v-ko">${koB(sl.ko,15,22)}</div>`:''}
           ${E()&&sl.en?`<div class="v-en">${esc(sl.en)}</div>`:''}
           <div class="ref">${esc(sl.ref_ko||'')}${sl.ref_en?' · '+esc(sl.ref_en):''}</div>${pg(sl)}`,'c-scr'));
      } else if(sl.type==='point'||sl.type==='question'||sl.type==='conclusion'||sl.type==='bigidea'){
        const sub=(sl.sub_ko||sl.sub_en)?`<div class="sub">${K()&&sl.sub_ko?koB(sl.sub_ko,22,30):''}${E()&&sl.sub_en?`<span class="se">${esc(sl.sub_en)}</span>`:''}</div>`:'';
        const lbl=sl.label_ko?`${esc(sl.label_ko)}${sl.label_en?' · '+esc(sl.label_en):''}`:(sl.type==='question'?'서론 · INTRODUCTION':sl.type==='conclusion'?'결론 · CONCLUSION':'요점 · POINT');
        out.push(cardHTML(
          `<div class="label">${lbl}</div>
           ${K()&&sl.ko?`<div class="p-ko">${koB(sl.ko,15,22)}</div>`:''}
           ${E()&&sl.en?`<div class="p-en">${esc(sl.en)}</div>`:''}
           ${sub}${pg(sl)}`,'c-point'));
      } else if(sl.type==='blessing'){
        out.push(cardHTML(
          `<div class="label">축복 · BENEDICTION</div>
           ${K()&&sl.ko?`<div class="b-ko">${koB(sl.ko,14,20)}</div>`:''}
           ${E()&&sl.en?`<div class="b-en">${esc(sl.en)}</div>`:''}
           <div class="amen">${esc(sl.amen_ko||'아멘')}</div>${pg(sl)}`,'c-bless'));
      }
    });
    return out;
  }

  // 긴 문장이 카드를 넘치면 비례 축소해 항상 카드 안에 맞춤 (모든 설교·포맷·내보내기 공통)
  function fitCards(){
    document.querySelectorAll('.card').forEach(c=>{
      const pad=c.querySelector('.pad'), fit=pad&&pad.querySelector('.fit');
      if(!fit)return;
      fit.style.transform='';
      const cs=getComputedStyle(pad);
      const avail=c.clientHeight-parseFloat(cs.paddingTop)-parseFloat(cs.paddingBottom);
      const h=fit.scrollHeight;
      if(h>avail+0.5){ fit.style.transform='scale('+(avail/h).toFixed(4)+')'; }
    });
  }
  function render(){
    if(!cur)return;
    const cards=buildCards(cur);
    cardsEl.innerHTML=cards.map((c,i)=>`<div class="item">${c}<button class="dl" onclick="dl(${i})">PNG 저장</button></div>`).join('');
    requestAnimationFrame(fitCards);
  }

  function fileName(i){return (cur.date||'sermon')+'_'+String(i+1).padStart(2,'0')+'.png';}
  function ensureH2C(){
    if(window.html2canvas) return Promise.resolve();
    return new Promise((res,rej)=>{var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s);});
  }
  async function dl(i){
    await ensureH2C();
    await document.fonts.ready;
    fitCards();
    const card=cardsEl.querySelectorAll('.card')[i];
    const canvas=await html2canvas(card,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=fileName(i);a.click();
  }
  async function saveAll(){
    const n=cardsEl.querySelectorAll('.card').length;
    for(let i=0;i<n;i++){ await dl(i); await new Promise(r=>setTimeout(r,600)); }
  }
</script>
</body>
</html>
