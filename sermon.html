<script src="sermons-data.js"></script>
<script>
  const PREVIEW_COUNT = 3;   // 비멤버가 열람 가능한 최근 설교 수
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || (window.SERMONS_DATA && window.SERMONS_DATA.sermons[0] && window.SERMONS_DATA.sermons[0].id);
  const stage = document.getElementById('stage');
  let slides=[], cur=0, lang='both';
  let SERMON=null;

  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  // 호흡 단위 한글 줄바꿈 — 쉼표·연결어미 우선, 길이 균형(DP). 데이터는 안 건드리고 렌더 시 자동 적용.
  function brkScore(w){
    if(/[—–―ー]$/.test(w)) return 6;                                          // 줄표 뒤에서 끊음
    if(/[,，][”"’')\]]?$/.test(w)) return 5;                                  // 쉼표
    if(/[.!?…][”"’')\]]?$/.test(w)) return 4;                                 // 문장끝
    if(/(으나|지만|면서|는데|은데|아서|어서|여서|도록|거나|니까|므로|지마는|건만|든지)[”"’')\]]?$/.test(w)) return 4; // 연결어미(강)
    if(/^(이|그|저|새|헌|옛|한|두|세|네|모든|온갖|어떤|무슨|웬|온|각|매|첫|다른|딴|별|그런|이런|저런|아무|여러|몇|단|전)$/.test(w)) return -5; // 관형사(뒤 명사와 붙임)
    if(/(던)$/.test(w)) return -3;                                            // 관형형(~던)
    if(/^.[은는을]$/.test(w)) return -2;                                      // 2음절 관형형 추정(깊은 등)
    if(/(하고|하며|하면|이며|이고|되고|되며|라며|라고|보다)$/.test(w)) return 3;    // 동사·인용 연결
    if(/(고|며|면|나)$/.test(w)) return 2;                                      // 연결어미(약)
    if(/(은|는|이|가|을|를|에|에서|에게|으로|로|와|과|도|만|까지|부터|의|께서)$/.test(w)) return 1; // 조사
    return 0;
  }
  function koBreath(t, ideal, hard){
    t=(t||'').trim();
    if(!t || !/[가-힣]/.test(t)) return t;
    var words=t.split(/\s+/), n=words.length;
    if(n<2) return t;
    function cl(w){return [...w].length;}
    var pre=[0]; for(var i=0;i<n;i++) pre.push(pre[i]+cl(words[i])+1);
    function lineLen(a,b){return pre[b+1]-pre[a]-1;}
    if(lineLen(0,n-1)<=ideal+4) return t;
    var BASE=8, BREAKW=14, MINLINE=6, LW=0.3;
    var cost=new Array(n+1).fill(Infinity), prev=new Array(n+1).fill(-1); cost[0]=0;
    for(var b=0;b<n;b++){
      for(var a=0;a<=b;a++){
        if(cost[a]===Infinity) continue;
        var len=lineLen(a,b), c=cost[a], dev=len-ideal;
        c+=dev*dev*LW;
        if(len>hard) c+=(len-hard)*40;
        if(b!==n-1){ if(len<MINLINE) c+=60; c+=BASE+(5-brkScore(words[b]))*BREAKW; }
        if(c<cost[b+1]){cost[b+1]=c;prev[b+1]=a;}
      }
    }
    var cuts={}, k=n; while(prev[k]>0){ cuts[prev[k]-1]=1; k=prev[k]; }
    var out=''; for(var j=0;j<n;j++){ out+=words[j]; if(j<n-1) out+= cuts[j]?'\n':' '; }
    return out;
  }
  function ln(ko,en,koCls,enCls,sub){
    let h='';
    if(lang!=='en' && ko){
      var kb=koBreath(ko, sub?18:15, sub?28:24);
      h+=`<div class="ko ${koCls||''}">${esc(kb).replace(/\n/g,'<br>')}</div>`;
    }
    if(lang!=='ko' && en) h+=`<div class="en ${enCls||''}">${esc(en)}</div>`;
    return h;
  }

  // 긴 카드 자동 분할 — 문장 경계에서 균형있게(DP) 나눠 한 카드가 너무 길지 않게.
  function sentsOf(t){ return (t||'').trim().split(/(?<=[.!?…])\s+/).filter(function(x){return x;}); }
  function partN(lens,P){
    var m=lens.length, pre=[0], i; for(i=0;i<m;i++) pre.push(pre[i]+lens[i]);
    var total=pre[m], target=total/P, INF=1e18, dp=[], from=[];
    for(i=0;i<=m;i++){ dp.push(new Array(P+1).fill(INF)); from.push(new Array(P+1).fill(-1)); }
    dp[0][0]=0;
    for(var p=1;p<=P;p++) for(i=1;i<=m;i++) for(var j=p-1;j<i;j++){
      if(dp[j][p-1]>=INF) continue;
      var seg=pre[i]-pre[j], d=seg-target, c=dp[j][p-1]+d*d;
      if(c<dp[i][p]){ dp[i][p]=c; from[i][p]=j; }
    }
    var cuts=[], ii=m, pp=P; while(pp>0){ var jj=from[ii][pp]; cuts.unshift([jj,ii]); ii=jj; pp--; }
    return cuts;
  }
  function splitN(text,P){
    var s=sentsOf(text); if(s.length<=1) return [text||''];
    P=Math.min(P,s.length); if(P<2) return [text];
    return partN(s.map(function(x){return [...x].length;}),P).map(function(c){return s.slice(c[0],c[1]).join(' ');});
  }
  function paginate(arr){
    var ST={question:1,point:1,conclusion:1,blessing:1,section:1,scripture:1}, MAXC=120, TRIG=150, res=[];
    arr.forEach(function(s){
      var koc=s.ko?[...s.ko].length:0;
      if(!ST[s.type] || koc<=TRIG){ res.push(s); return; }
      var P=Math.ceil(koc/MAXC), es=sentsOf(s.en).length; if(es>=2) P=Math.min(P,es);
      var kp=splitN(s.ko,P); if(kp.length<2){ res.push(s); return; }
      var ep=splitN(s.en||'',kp.length), n=kp.length;
      for(var i=0;i<n;i++){
        var c=Object.assign({},s);
        c.ko=kp[i]; c.en=(ep[i]!==undefined?ep[i]:'');
        if(i<n-1){ delete c.sub_ko; delete c.sub_en; delete c.ref; delete c.ref_ko; delete c.ref_en; }
        c._p=i+1; c._pn=n; res.push(c);
      }
    });
    return res;
  }

  let RAWDATA=null, isMember=false;
  function onData(data){ RAWDATA=data; evaluate(); }
  function onErr(){ stage.innerHTML='<div class="empty">설교를 불러오지 못했습니다.<br>sermons-data.js 파일이 같은 폴더에 있는지 확인해 주세요.</div>'; }

  function publicIds(data){
    return (data.sermons||[]).slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,PREVIEW_COUNT).map(s=>s.id);
  }
  function showGate(){
    document.title=SERMON.title_ko+' · 한마음침례교회';
    document.getElementById('ftTitle').textContent=SERMON.title_ko;
    ['ftBtn','cardBtn','langBtn'].forEach(idn=>{ const el=document.getElementById(idn); if(el) el.style.display='none'; });
    document.getElementById('prev').style.visibility='hidden';
    document.getElementById('next').style.visibility='hidden';
    document.getElementById('counter').textContent='';
    document.getElementById('bar').style.width='0';
    // 공개 미리보기(제목·본문 구절은 크롤링 가능) + 전문/슬라이드는 로그인 게이팅
    stage.innerHTML=`<div class="slide s-title">
      <img class="cross" src="cross-cut.png" alt="한마음침례교회 로고">
      <h1>${esc(SERMON.title_ko)}</h1>
      <div class="en-title">${esc(SERMON.title_en||'')}</div>
      <div class="ref">${esc(SERMON.scripture_ref_ko||'')} · ${esc(SERMON.scripture_ref_en||'')}</div>
      <div class="by">${esc(SERMON.preacher_ko||'')}${SERMON.preacher_en? ' · '+esc(SERMON.preacher_en):''}</div>
      <div class="gate2" style="margin-top:34px">
        <div class="lock">🔒</div>
        <p>이 설교의 <b>전체 슬라이드와 전문</b>은 멤버 로그인 후 보실 수 있습니다. 최근 ${PREVIEW_COUNT}편은 로그인 없이 바로 보실 수 있어요.
          <span class="en">Full slides and transcript are available to members after signing in. The latest ${PREVIEW_COUNT} sermons are open to all.</span></p>
        <button class="g-btn" onclick="netlifyIdentity.open()">로그인 · 멤버 가입</button>
        <a class="g-link" href="sermons.html">← 설교 목록으로 돌아가기</a>
      </div>
    </div>`;
  }
  function evaluate(){
    if(!RAWDATA) return;
    SERMON=(RAWDATA.sermons||[]).find(x=>x.id===id);
    if(!SERMON){ stage.innerHTML='<div class="empty">설교를 찾을 수 없습니다.<br><a href="sermons.html">← 목록으로</a></div>'; return; }
    ['ftBtn','cardBtn','langBtn'].forEach(idn=>{ const el=document.getElementById(idn); if(el) el.style.display=''; });
    document.title=SERMON.title_ko+' · 한마음침례교회';
    document.getElementById('ftTitle').textContent=SERMON.title_ko;
    document.getElementById('cardBtn').href='cards.html?id='+encodeURIComponent(SERMON.id);
    slides=paginate(SERMON.slides && SERMON.slides.length ? SERMON.slides : buildFallback(SERMON));
    buildFullText(SERMON);
    cur=0; render();
  }
  if(window.SERMONS_DATA){ onData(window.SERMONS_DATA); }
  else { fetch('sermons.json').then(r=>r.json()).then(onData).catch(onErr); }

  function buildFallback(s){
    const out=[{type:'title',title_ko:s.title_ko,title_en:s.title_en,ref_ko:s.scripture_ref_ko,ref_en:s.scripture_ref_en,preacher_ko:s.preacher_ko,preacher_en:s.preacher_en,date:s.date}];
    (s.scripture_text||[]).forEach(p=>out.push({type:'scripture',ref_ko:s.scripture_ref_ko,ref_en:s.scripture_ref_en,ko:p.ko,en:p.en}));
    return out;
  }

  function render(){
    if(!slides.length) return;
    const s=slides[cur];
    let html='';
    if(s.type==='title'){
      html=`<div class="slide s-title">
        <img class="cross" src="cross-cut.png" alt="한마음침례교회 로고">
        <h1>${esc(s.title_ko)}</h1>
        <div class="en-title">${esc(s.title_en||'')}</div>
        <div class="ref">${esc(s.ref_ko||'')} · ${esc(s.ref_en||'')}</div>
        <div class="by">${esc(s.preacher_ko||'')} · ${esc(s.preacher_en||'')}</div></div>`;
    } else if(s.type==='question'){
      html=`<div class="slide s-question">
        <div class="label">${esc(s.label_ko||'')} · ${esc(s.label_en||'')}</div>
        ${ln(s.ko,s.en)}</div>`;
    } else if(s.type==='section'){
      html=`<div class="slide s-section">
        <div class="num">${esc(s.num_ko||'')}<small>${esc(s.num_en||'')}</small></div>
        ${lang!=='en'?`<h2>${esc(s.ko)}</h2>`:''}
        ${lang!=='ko'?`<div class="en">${esc(s.en||'')}</div>`:''}
        ${s.ref?`<div class="ref">${esc(s.ref)}</div>`:''}</div>`;
    } else if(s.type==='scripture'){
      html=`<div class="slide s-scripture">
        <div class="qmark">&ldquo;</div>
        ${ln(s.ko,s.en)}
        <div class="ref">${esc(s.ref_ko||'')} · ${esc(s.ref_en||'')}</div></div>`;
    } else if(s.type==='point'){
      html=`<div class="slide s-point">
        ${s.label_ko?`<div class="label">${esc(s.label_ko)} · ${esc(s.label_en||'')}</div>`:''}
        ${ln(s.ko,s.en)}
        ${(s.sub_ko||s.sub_en)?`<div class="sub">${ln(s.sub_ko,s.sub_en,'','',true)}</div>`:''}</div>`;
    } else if(s.type==='bigidea'){
      html=`<div class="slide s-bigidea">
        ${ln(s.ko,s.en)}
        <div class="cols">
          <div class="col"><div class="h">${esc(s.left_ko)}</div><div class="he">${esc(s.left_en||'')}</div>
            ${lang!=='en'?`<div class="d">${esc(s.left_desc_ko||'')}</div>`:''}${lang!=='ko'?`<div class="de">${esc(s.left_desc_en||'')}</div>`:''}</div>
          <div class="col"><div class="h">${esc(s.right_ko)}</div><div class="he">${esc(s.right_en||'')}</div>
            ${lang!=='en'?`<div class="d">${esc(s.right_desc_ko||'')}</div>`:''}${lang!=='ko'?`<div class="de">${esc(s.right_desc_en||'')}</div>`:''}</div>
        </div>
        ${(s.sub_ko||s.sub_en)?`<div class="sub">${ln(s.sub_ko,s.sub_en,'','',true)}</div>`:''}</div>`;
    } else if(s.type==='conclusion'){
      html=`<div class="slide s-conclusion">
        <div class="label">${esc(s.label_ko||'')} · ${esc(s.label_en||'')}</div>
        ${ln(s.ko,s.en)}
        ${(s.sub_ko||s.sub_en)?`<div class="sub">${ln(s.sub_ko,s.sub_en,'','',true)}</div>`:''}</div>`;
    } else if(s.type==='blessing'){
      html=`<div class="slide s-blessing">
        ${ln(s.ko,s.en)}
        <div class="amen">${esc(s.amen_ko||'아멘')}<small>${esc(s.amen_en||'Amen')}</small></div></div>`;
    }
    if(s._pn>1) html=html.replace(/<\/div>\s*$/, '<div style="margin-top:22px;font-size:.78rem;letter-spacing:.18em;color:rgba(30,41,59,.34);font-weight:700">'+s._p+' / '+s._pn+'</div></div>');
    stage.innerHTML=html;
    document.getElementById('counter').textContent=`${cur+1} / ${slides.length}`;
    document.getElementById('bar').style.width=((cur+1)/slides.length*100)+'%';
    document.getElementById('prev').style.visibility=cur===0?'hidden':'visible';
    document.getElementById('next').style.visibility=cur===slides.length-1?'hidden':'visible';
  }

  function go(d){ const n=cur+d; if(n>=0&&n<slides.length){cur=n;render();} }
  document.getElementById('prev').onclick=()=>go(-1);
  document.getElementById('next').onclick=()=>go(1);
  document.addEventListener('keydown',e=>{
    if(document.getElementById('fulltext').classList.contains('open')) return;
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){go(1);e.preventDefault();}
    if(e.key==='ArrowLeft'||e.key==='PageUp'){go(-1);}
    if(e.key==='Home'){cur=0;render();}
    if(e.key==='End'){cur=slides.length-1;render();}
  });
  let tx=0;
  stage.addEventListener('touchstart',e=>tx=e.changedTouches[0].clientX,{passive:true});
  stage.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50) go(dx<0?1:-1);},{passive:true});

  document.getElementById('langBtn').onclick=()=>{
    lang = lang==='both'?'ko':lang==='ko'?'en':'both';
    document.getElementById('langBtn').textContent = lang==='both'?'한 / EN':lang==='ko'?'한국어':'ENGLISH';
    render();
  };

  function buildFullText(s){
    const html=(s.body||[]).map(p=>
      p.section
        ? `<h3 class="ft-sec">${esc(p.ko)}</h3>`
        : `<div class="para">${p.ko?`<div class="ko">${esc(p.ko)}</div>`:''}${p.en?`<div class="en">${esc(p.en)}</div>`:''}</div>`).join('');
    document.getElementById('ftBody').innerHTML = html || '<p style="text-align:center;color:#64748b">전문이 아직 등록되지 않았습니다.</p>';
  }
  document.getElementById('ftBtn').onclick=()=>document.getElementById('fulltext').classList.add('open');
  document.getElementById('ftClose').onclick=()=>document.getElementById('fulltext').classList.remove('open');
</script>
</body>
</html>
