<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>칼빈 카드 만들기 (운영자용) · 한마음침례교회</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--bg:#f4f2ed;--brown:#3a4744;--ink:#46514c;--soft:#5b645d;--sage:#97b3ae;--gold-ink:#4a6a62;--line:#e3ddd3;--pink:#f2c3b9;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;word-break:keep-all}
.top{background:#fff;border-bottom:1px solid var(--line);padding:.7rem 1.2rem;font-family:"Gowun Batang",serif;font-weight:700;color:var(--brown)}
.top a{color:var(--gold-ink);text-decoration:none;font-family:"Pretendard",sans-serif;font-weight:600;font-size:.85rem;margin-left:1rem}
.wrap{max-width:1200px;margin:1.5rem auto;padding:0 1rem;display:flex;gap:1.6rem;flex-wrap:wrap;align-items:flex-start}
.panel{flex:1;min-width:320px}
.panel h2{font-size:1rem;color:var(--brown);margin:.9rem 0 .45rem;font-family:"Gowun Batang",serif}
select{width:100%;padding:.55rem .8rem;border:1px solid var(--line);border-radius:9px;font-size:.92rem;background:#fff;color:var(--ink);font-family:inherit}
#qlist{display:flex;flex-direction:column;gap:.45rem;max-height:330px;overflow:auto}
.qbtn{text-align:left;background:#fff;border:1px solid var(--line);border-left:3px solid var(--sage);border-radius:9px;
padding:.55rem .8rem;font-size:.84rem;cursor:pointer;color:var(--ink);font-family:inherit;line-height:1.5}
.qbtn:hover,.qbtn.on{border-left-color:var(--gold-ink);background:#eef3f0}
.qbtn .st{font-weight:800;color:#b08a3a;margin-right:.35rem}
.hint{font-size:.8rem;color:var(--soft);margin:.5rem 0}
textarea{width:100%;height:200px;padding:.7rem .9rem;border:1px solid var(--line);border-radius:9px;font-size:.85rem;font-family:inherit;color:var(--ink);background:#fff;resize:vertical}
.btn{display:inline-block;background:var(--gold-ink);color:#fff;font-weight:700;border:0;border-radius:999px;
padding:.6rem 1.5rem;font-size:.95rem;cursor:pointer;font-family:inherit;margin:.6rem .4rem 0 0}
.btn:hover{background:#38564f}
.btn.ghost{background:#fff;color:var(--gold-ink);border:1px solid var(--gold-ink)}
/* ---- 카드 (미리보기 540px, 다운로드 시 2배 = 1080px) ---- */
.stage{flex:none}
#card{width:540px;height:540px;background:var(--bg);position:relative;display:flex;flex-direction:column;
padding:42px 44px;border:1px solid var(--line);overflow:hidden}
#card .cb{display:flex;align-items:center;gap:10px}
#card .cb img{height:30px;width:auto}
#card .cb .nm{font-family:"Gowun Batang",serif;font-weight:700;color:var(--brown);font-size:15px;line-height:1.25}
#card .cb .nm small{display:block;font-family:"Pretendard",sans-serif;font-weight:700;font-size:8.5px;color:var(--gold-ink);letter-spacing:.1em}
#card .qmark{font-family:Georgia,serif;font-size:64px;line-height:.6;color:var(--pink);margin:30px 0 6px}
#card .cq{flex:1;display:flex;align-items:center;font-family:"Palatino Linotype","Book Antiqua",Georgia,serif;
font-size:25px;line-height:1.55;color:var(--brown);outline:none;overflow:hidden}
#card .cmeta{margin-top:18px;padding-top:14px;border-top:1.5px solid var(--sage)}
#card .cmeta .t1{font-weight:700;color:var(--gold-ink);font-size:14.5px}
#card .cmeta .t2{font-size:11.5px;color:var(--soft);margin-top:3px}
#card .curl{position:absolute;right:44px;bottom:20px;font-size:10.5px;color:var(--soft);letter-spacing:.03em}
@media(max-width:1180px){#card{width:440px;height:440px;padding:34px 36px}#card .cq{font-size:21px}}
@media(max-width:480px){.stage{margin:0 auto}
#card{width:340px;height:340px;padding:24px 26px}
#card .cq{font-size:16px;line-height:1.5}#card .qmark{font-size:44px;margin:18px 0 4px}
#card .cb img{height:24px}#card .cb .nm{font-size:12px}
#card .cmeta .t1{font-size:11.5px}#card .cmeta .t2{font-size:9.5px}
#card .curl{right:26px;bottom:12px;font-size:8.5px}}
</style>
</head>
<body>
<div class="top">칼빈 카드 만들기 <span style="font-size:.75rem;color:#5b645d;font-family:Pretendard">— 오늘의 칼빈 문장 (운영자용)</span>
<a href="index.html">← 칼빈 강요 목록</a><a href="../index.html">교회 홈</a></div>
<div class="wrap">
  <div class="panel">
    <h2>1. 레슨(Day) 선택</h2>
    <select id="day"></select>
    <h2>2. 문장 선택 <span style="font-weight:400;font-size:.78rem;color:#5b645d">(★★★ = 그날의 핵심)</span></h2>
    <div id="qlist"></div>
    <p class="hint">✏️ 문장이 길면 <b>카드 안의 글을 직접 클릭해 잘라내세요</b> (카드 영역이 바로 편집됩니다).</p>
    <h2>3. 인스타 캡션</h2>
    <textarea id="cap"></textarea>
    <button class="btn" id="dl">🖼️ PNG 다운로드 (1080×1080)</button>
    <button class="btn ghost" id="cc">📋 캡션 복사</button>
  </div>
  <div class="stage">
    <div id="card">
      <div class="cb"><img src="../cross-cut.png" alt=""><span class="nm">한마음침례교회<small>CALVIN · INSTITUTES IN ENGLISH</small></span></div>
      <div class="qmark">“</div>
      <div class="cq" id="cq" contenteditable="true" spellcheck="false"></div>
      <div class="cmeta"><div class="t1" id="ct1"></div><div class="t2" id="ct2"></div></div>
      <div class="curl">oneheartchurchcolumbus.org/calvin</div>
    </div>
  </div>
</div>
<script src="cards-data.js"></script>
<script>
var D=(window.CALVIN_CARDS||[]).slice().reverse(),cur=null;
var sel=document.getElementById('day'),ql=document.getElementById('qlist'),
cq=document.getElementById('cq'),t1=document.getElementById('ct1'),t2=document.getElementById('ct2'),cap=document.getElementById('cap');
D.forEach(function(d,i){var o=document.createElement('option');o.value=i;
o.textContent='Day '+d.day+' — '+d.book+'권 '+d.ch+'장 §'+d.sec+(d.topic?' · '+d.topic:'');sel.appendChild(o);});
function stars(n){return n===3?'★★★':'★★';}
function fit(){var fs=25;cq.style.fontSize=fs+'px';
while(cq.scrollHeight>cq.clientHeight&&fs>13){fs-=1;cq.style.fontSize=fs+'px';}}
function caption(d,q){var t=(q||'').slice(0,140)+((q||'').length>140?'…':'');
return '🕯️ 칼빈 『기독교 강요』 영어로 읽기 — Day '+d.day+'\n'
+'📖 '+d.book+'권 '+d.ch+'장 §'+d.sec+(d.topic?' · '+d.topic:'')+'\n\n'
+'“'+t+'”\n\n'
+'매일 한 절씩, 영어 원문을 한 문장씩 —\n끊어읽기·문법·어휘까지 무료 전문 해설로 함께 읽어요.\n'
+'🔗 oneheartchurchcolumbus.org/calvin\n\n'
+'#기독교강요 #칼빈 #영어원서 #영어공부 #신학영어 #성경공부 #말씀묵상 #한인교회 #콜럼버스 #CalvinInstitutes #TheologyInEnglish #오직예수';}
function setQuote(d,q){cq.textContent=q;t1.textContent=(d.topic?d.topic+' · ':'')+d.book+'권 '+d.ch+'장 §'+d.sec;
t2.textContent='기독교 강요 영어로 읽기 · Day '+d.day+' · Beveridge 역';cap.value=caption(d,q);fit();}
function pick(i){cur=D[i];ql.innerHTML='';
var qs=(cur.quotes||[]).slice().sort(function(a,b){return b.s-a.s;});
if(!qs.length){ql.innerHTML='<p class="hint">이 레슨에서 추출된 문장이 없습니다.</p>';setQuote(cur,'');return;}
qs.forEach(function(q,j){var b=document.createElement('button');b.className='qbtn'+(j===0?' on':'');
b.innerHTML='<span class="st">'+stars(q.s)+'</span>'+q.t.slice(0,110)+(q.t.length>110?'…':'');
b.onclick=function(){ql.querySelectorAll('.qbtn').forEach(function(x){x.classList.remove('on');});
b.classList.add('on');setQuote(cur,q.t);};ql.appendChild(b);});
setQuote(cur,qs[0].t);}
sel.onchange=function(){pick(+sel.value);};pick(0);
cq.addEventListener('input',function(){fit();if(cur)cap.value=caption(cur,cq.textContent);});
document.getElementById('cc').onclick=function(){cap.select();document.execCommand('copy');this.textContent='✅ 복사됨';
var b=this;setTimeout(function(){b.textContent='📋 캡션 복사';},1500);};
document.getElementById('dl').onclick=function(){var b=this;b.textContent='생성 중…';
function go(){html2canvas(document.getElementById('card'),{scale:2,useCORS:true}).then(function(cv){
var a=document.createElement('a');a.download='calvin-day'+(cur?cur.day:'')+'.png';a.href=cv.toDataURL('image/png');a.click();
b.textContent='🖼️ PNG 다운로드 (1080×1080)';});}
if(window.html2canvas){go();}else{var s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=go;document.head.appendChild(s);}};
</script>
</body>
</html>
