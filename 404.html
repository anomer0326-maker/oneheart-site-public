<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 · 한마음침례교회</title>
<meta name="robots" content="noindex">
<script>
/* 칼빈 레슨 주소 대소문자 자동 교정 (Netlify는 대소문자 무시했으나 GitHub Pages는 구분 →
   예전 즐겨찾기 day05_book1-ch2-§2 를 Day05_Book1-Ch2-§2.html 로 되살림) */
(function(){
  try{
    var p = decodeURIComponent(location.pathname);
    var m = p.match(/^(.*\/calvin\/html\/)(.+?)(\.html?)?$/i);
    if(!m) return;
    var mm = m[2].match(/^day\s*0*(\d+)_book\s*(\d+)-ch\s*(\d+)-§?\s*(.+)$/i);
    if(!mm) return;
    var day = mm[1].length < 2 ? ('0'+mm[1]).slice(-2) : mm[1];
    var target = m[1] + 'Day'+day+'_Book'+mm[2]+'-Ch'+mm[3]+'-§'+mm[4] + '.html';
    if(target !== p){ location.replace(target + location.hash); }
  }catch(e){}
})();
</script>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--cream:#f4f2ed;--brown:#3a4744;--ink:#46514c;--soft:#5b645d;--gold:#97b3ae;--gold-ink:#4a6a62;--line:#e3ddd3;--pink:#f2c3b9;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",sans-serif;background:#fff;color:var(--ink);word-break:keep-all;
min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;padding:40px 24px;border-bottom:5px solid var(--gold)}
img.cross{height:90px;width:auto;margin-bottom:26px}
h1{font-family:"Gowun Batang",serif;font-weight:900;font-size:1.9rem;color:var(--brown);line-height:1.4}
h1 span{display:block;font-family:"Pretendard",sans-serif;font-weight:500;font-size:.85rem;color:var(--soft);letter-spacing:.15em;margin-top:10px}
p{margin-top:18px;color:var(--soft)}
.links{margin-top:34px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.links a{display:inline-block;padding:11px 26px;border:1px solid var(--gold-ink);border-radius:999px;
color:var(--gold-ink);font-weight:600;text-decoration:none;font-size:.95rem}
.links a.main{background:var(--gold-ink);color:#fff}
.links a:hover{background:#38564f;color:#fff;border-color:#38564f}
</style>
</head>
<body>

</html>
